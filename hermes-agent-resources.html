<!doctype html>

  <main class="resource-shell">

      <div class="identity-chip" id="identityChip" hidden><span id="identityText"></span><button type="button" id="switchUserButton">切換</button></div>

    <section class="resource-hero">

        <div class="resource-stats">

        <span class="resource-filter-label">排序</span>
        <button class="resource-sort" type="button" data-sort="relevance" aria-pressed="true">精選排序</button>
        <button class="resource-sort" type="button" data-sort="date" aria-pressed="false">最新</button>
        <button class="resource-sort" type="button" data-sort="title" aria-pressed="false">標題 A-Z</button>

    <div class="resource-meta"><span id="resultCount">載入中...</span><span id="sourceText"></span></div>
    <section class="resource-grid" id="resourceGrid" aria-label="Hermes Agent 學習資料"></section>
    <p class="resource-empty" id="emptyState" hidden>找不到符合的 Hermes Agent 資料。</p>

  <script src="./tutorial-gate.js?v=20260724-fixed-nav"></script>
  <script>window.RESOURCE_LIBRARY_CONFIG={title:"Hermes Agent 學習資料庫",dataUrl:"./hermes-agent-resources.json",detailUrl:"./hermes-agent-resource-detail.html",defaultSort:"relevance"};</script>
