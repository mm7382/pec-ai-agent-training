<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Local Agent 詳細內容 - PEC AI Agent 教育訓練資料庫</title>
  <meta name="description" content="Local Agent 熱門工具詳細介紹、下載方式與社群討論整理">
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./styles.css?v=20260714-scroll-scope">
  <script src="./site-config.js?v=20260710-local-agent"></script>
  <style>
    .agent-shell{width:min(1180px,calc(100vw - 32px));margin:0 auto;padding:18px 0 46px}
    .agent-layout{display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:18px;margin-top:22px;align-items:start}
    .agent-main,.agent-side{min-width:0;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow)}
    .agent-main{padding:30px}
    .agent-side{padding:18px;position:sticky;top:18px}
    .agent-kicker{color:#b8ec72;font-size:12px;font-weight:950;text-transform:uppercase}
    .agent-title{font-size:clamp(34px,5vw,56px);line-height:1.05;margin:10px 0 14px;overflow-wrap:anywhere}
    .agent-summary{color:var(--muted);font-size:18px;line-height:1.7}
    .agent-section{margin-top:24px;padding-top:20px;border-top:1px solid var(--line)}
    .agent-section h2{font-size:23px;margin-bottom:10px}
    .agent-section p,.agent-section li{color:var(--muted);line-height:1.75;overflow-wrap:anywhere}
    .agent-section ul{padding-left:22px}
    .agent-section li+li{margin-top:8px}
    .agent-callout{margin-top:12px;border:1px solid rgba(155,210,60,.25);border-radius:8px;background:rgba(155,210,60,.06);padding:14px}
    .agent-tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}
    .agent-tags span{border:1px solid rgba(155,210,60,.35);border-radius:999px;padding:5px 9px;color:#b8ec72;font-size:12px;font-weight:850}
    .agent-metrics{display:grid;gap:8px}
    .agent-metrics div{display:flex;justify-content:space-between;gap:10px;border:1px solid var(--line);border-radius:8px;padding:10px;background:rgba(220,235,242,.06)}
    .agent-metrics span{color:var(--muted);font-weight:850}
    .agent-metrics strong{text-align:right;overflow-wrap:anywhere}
    .agent-actions{display:grid;gap:10px;margin-top:14px}
    .agent-actions a{display:flex;justify-content:center;align-items:center;min-height:42px;border-radius:8px;text-decoration:none;font-weight:950}
    .agent-primary{background:#9bd23c;color:#061014}
    .agent-secondary{border:1px solid var(--line);color:var(--ink);background:rgba(220,235,242,.08)}
    .back-link{display:inline-flex;margin-top:16px;color:#b8ec72;font-weight:900;text-decoration:none}
    code{overflow-wrap:anywhere}
    @media(max-width:900px){.agent-layout{grid-template-columns:1fr}.agent-side{position:static}.agent-main{padding:20px}.agent-shell{width:min(100vw - 20px,1180px)}}
  </style>
</head>
<body>
  <main class="agent-shell">
    <header class="topbar" aria-label="網站導覽">
      <a class="brand" href="./index.html" aria-label="PEC AI Agent 教育訓練首頁">
        <img class="brand-logo" src="./assets/brand/adlink-mark-red.png" alt="ADLINK">
        <span>
          <strong>AI Agent 教育訓練</strong>
          <small>Local Agent 詳細內容</small>
        </span>
      </a>
      <div class="identity-chip" id="identityChip" hidden>
        <span id="identityText"></span>
        <button type="button" id="switchUserButton">切換</button>
      </div>
    </header>

    <section class="agent-layout">
      <article class="agent-main" id="agentMain">
        <p class="agent-kicker">Loading</p>
        <h1 class="agent-title">載入中...</h1>
      </article>
      <aside class="agent-side" id="agentSide"></aside>
    </section>
  </main>

  <script src="./tutorial-gate.js?v=20260723-direct-nav-v2"></script>
  <script src="./local-agent-detail.js?v=20260715-fit-guidance"></script>
  <script src="./feedback-widget.js?v=20260710-local-agent"></script>
</body>
</html>
